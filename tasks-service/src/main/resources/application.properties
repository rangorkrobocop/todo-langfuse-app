# Server — PORT env var preserved for backward compat with docker-compose
server.port=${PORT:4002}

# Database
# Production: set SPRING_DATASOURCE_URL=jdbc:postgresql://tasks-db:5432/postgres
# Local dev without PostgreSQL: H2 in-memory is used automatically
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:zendo;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA — update creates missing tables/columns; use Flyway for production migrations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# H2 console (available at /h2-console when using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator — expose only /health for liveness probes
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
